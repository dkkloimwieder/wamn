[package]
name = "wamn-run-store"
description = "wamn run-state persistence (5.7): the runs/node_runs model + branch-aware replay reconstruction and partial-re-run planning over the wamn-runner engine (5.2). PURE — no DB, no wasm, no clock; the driver (components/flowrunner) supplies the wamn:postgres effects. Reconstruction rebuilds the exact frontier from persisted node_runs; a replay/partial-re-run is a new run linked to its origin (immutable lineage)."
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# The reconstruction/partial-re-run planners drive the pure engine's resume/
# seed_at primitives; the model persists its RunStatus/FailKind/NodeError taxonomy.
wamn-runner = { path = "../wamn-runner" }
# 9.6 capture: the per-flow `Flow.capture` policy the pure `capture` module
# applies at each node_runs write. Already in the closure via wamn-runner
# (Plan::compile takes a Flow); this is the direct edge for the policy type, and
# it is guest-compilable (the flowrunner guest already links wamn-flow).
wamn-flow = { path = "../wamn-flow" }
# SR11: the per-node checkpoint / completion builders that wamn-run-queue COMPOSES
# are produced as `Sql` (text + param arity) so the consumer renumbers its tail
# against the arity instead of hardcoding it. A leaf, no deps — keeps this crate
# guest-compilable.
wamn-sql = { path = "../wamn-sql" }
# The run/node-run records import/export as JSON (run-history read model);
# payloads are opaque JSON. No schemars — this is a store model, not a published
# contract (like wamn-ddl / wamn-api / wamn-runner).
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# No DB / wasm / clock dependency: reconstruction is a pure function of
# (plan, run record, node-run rows). The component owns every effect. The
# optional live-apply gate (tests/store.rs) shells out to `psql`, so there is no
# database dependency even in dev — the same pattern as wamn-ddl / wamn-rls / wamn-seed.
