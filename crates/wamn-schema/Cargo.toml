[package]
name = "wamn-schema"
description = "wamn schema versioning & environments (3.4): the draft->staged->applied lifecycle state machine over catalog versions, first-class dev/canary/prod environments keyed by the (org, project, env) triple, and JSON promotion between them (reuses wamn-ddl's additive/destructive confirmation gate)."
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# 3.4 COMPOSES the shipped model crates: the canonical catalog model + its diff
# (3.1), the DDL compiler + safety gate (3.2), and the control-plane registry
# (wamn-q3n.1) for the (org, project, env) Triple + closed Env vocabulary that an
# environment's identity and the "same application" promotion guard speak. It
# adds the lifecycle and promotion policy on top; it emits no DDL of its own (it
# reuses Migration) and defines no new persisted JSON contract (the promotion
# format is a Catalog, already owned by wamn-catalog).
wamn-catalog = { path = "../wamn-catalog" }
wamn-ddl = { path = "../wamn-ddl" }
wamn-registry = { path = "../wamn-registry" }
