# Generated by wamn-builder (5.5f). The serve-node runtime manifest for a
# custom node; grants DERIVED from its WIT imports (design-note 7). The plan's
# WorkloadDeployment (OCI fetch) is wamn-fqg.21; v0 ships the serve-node
# Deployment shape (deploy/platform/serve-node.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serve-node-sample-echo
  namespace: wamn-system
  labels: { app: serve-node-sample-echo }
  annotations:
    wamn.node.oci-ref: "registry.wamn-system.svc.cluster.local:5000/wamn/sample-node:dev"
    wamn.node.signed-digest: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
    wamn.node.signature: "abcdef"
spec:
  replicas: 1
  selector: { matchLabels: { app: serve-node-sample-echo } }
  template:
    metadata:
      labels: { app: serve-node-sample-echo }
    spec:
      automountServiceAccountToken: false
      containers:
        - name: serve-node
          image: wamn-host:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "info"
            - "serve-node"
            - "--node"
            - "/components/node.wasm"
            - "--port"
            - "8080"
          env:
            - name: WAMN_PROJECT
              value: "default"
            - name: WAMN_CREDENTIALS_FILE
              value: /etc/wamn/credentials/credentials.json
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { memory: "384Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: serve-node-sample-echo
  namespace: wamn-system
spec:
  selector: { app: serve-node-sample-echo }
  ports:
    - port: 8080
      targetPort: 8080
