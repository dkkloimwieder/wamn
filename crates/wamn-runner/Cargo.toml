[package]
name = "wamn-runner"
description = "wamn flow-runner engine (5.2): a pure, synchronous reducer over a wamn-flow graph — ported-edge walk, branch/merge, error-path routing, and retry/backoff keyed mechanically off the wamn:node error taxonomy. Effects (node dispatch, durable state, the clock) are the driver's; the engine only decides."
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# The engine walks the canonical flow graph (5.1) and relies on its structural
# validation guarantees (unique node ids, resolved edges, resolved entry).
wamn-flow = { path = "../wamn-flow" }
# The wamn:node error taxonomy is DEFINED by the node authoring contract (5.3)
# and re-exported from `outcome` — one definition shared by the engine, the
# drivers, and every node crate, with the dependency pointing SDK-ward (node
# crates never depend on the runner; the 5.13 purity rule).
wamn-node-sdk = { path = "../wamn-node-sdk" }
# Payloads and opaque node config are JSON; no schema of its own (this is an
# engine, not a contract — like wamn-ddl / wamn-api, no schemars).
serde_json = "1"

# No DB / host / wasm / clock dependency: the reducer is a pure function of
# (state, node outcome, now_ms). The component (components/flowrunner) owns every
# effect — dispatching nodes, wamn:postgres checkpoints, sleeping, the doorbell.
