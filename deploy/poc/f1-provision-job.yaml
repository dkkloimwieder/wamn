# POC-F1 provisioning: publish-catalog stands up the poc_f1 project schema —
# 3.2 floor for the POC catalog + wamn_catalog snapshot + run-state storage
# (runs/node_runs) + flow registry + wamn-seed business rows + the registered,
# ACTIVE receipt-received flow. Everything additive (shared-cluster guardrail).
# Fixtures come from the f1-fixtures ConfigMap:
#   kubectl -n wamn-system create configmap f1-fixtures \
#     --from-file=poc-receiving.catalog.json=crates/wamn-catalog/tests/fixtures/poc-receiving.catalog.json \
#     --from-file=f1-flow.json=deploy/poc/f1-flow.json \
#     --from-file=f1-seed.dataset.json=deploy/poc/f1-seed.dataset.json
apiVersion: batch/v1
kind: Job
metadata:
  name: f1-provision
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: f1-provision
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      containers:
        - name: f1-provision
          image: wamn-ctl:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "publish-catalog",
              "--catalog", "/fixtures/poc-receiving.catalog.json",
              "--tenant", "f1-tenant",
              "--schema", "poc_f1",
              "--provision",
              "--runstate",
              "--seed-dataset", "/fixtures/f1-seed.dataset.json",
              "--flow", "/fixtures/f1-flow.json",
            ]
          env:
            # Admin credential sourced from the `postgres-fixture-superuser`
            # Secret (secretKeyRef, defined in deploy/platform/postgres.yaml) —
            # no inline plaintext superuser password; the target stays the
            # fixture pod's `wamn` database, where poc_f1 lives. k8s expands
            # $(VAR) in a later env value against the earlier secretKeyRef vars,
            # so those must precede WAMN_PG_ADMIN_URL. Against a CNPG target,
            # swap the Secret name for the cluster's `<cluster>-superuser`
            # (same key shape) and the database for the env's DB.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          volumeMounts:
            - name: fixtures
              mountPath: /fixtures
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: fixtures
          configMap:
            name: f1-fixtures
