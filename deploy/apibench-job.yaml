# 4.1 in-cluster generated-REST-API-gateway gates. Runs the apibench subcommand
# of the wamn-gates image (SR1: gates ride their own image layered on the prod host stage), against the in-cluster
# Postgres (deploy/postgres.yaml). This Job is the gate of record; local docker
# runs are for iteration.
#
#   kubectl -n wamn-system apply -f deploy/apibench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/apibench --timeout=300s
#   kubectl -n wamn-system logs job/apibench
#
# The gate provisions a fresh ephemeral schema through the Postgres superuser
# (WAMN_PG_ADMIN_URL) — it emits the 3.2 tenant floor for a small catalog, a
# wamn_catalog snapshot table, and seeds two tenants — then drives the
# api-gateway component through its wasi:http/incoming-handler export (via
# ProxyPre, exactly as wash-runtime serves it) and asserts CRUD / expansion /
# RLS / injection-safety. The runner's wamn_app role is NOSUPERUSER/NOCREATEDB
# and cannot create schemas, exactly as in production.
apiVersion: batch/v1
kind: Job
metadata:
  name: apibench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: apibench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: every gate makes real DB round trips; pinning
      # the Job to the Postgres node keeps those off the cross-node overlay hop
      # (see the S2/S3 job rationale).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      containers:
        - name: apibench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "apibench"
            - "--api-gateway"
            - "/bench/api-gateway.wasm"
            - "--mode"
            - "all"
          env:
            # Gateway pool: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to provision/seed/drop the ephemeral schema.
            - name: WAMN_PG_ADMIN_URL
              value: postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/wamn
          resources:
            # No CPU limit on purpose: a CFS quota would throttle the runtime and
            # add scheduler stalls to the request path rather than real work —
            # the S2 CFS lesson. Memory is capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
