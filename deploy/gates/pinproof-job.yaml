# 11.3 in-cluster gate of record: pinproof drives "record-and-replay fixtures"
# (wamn-htn) against the shared postgres, provisioning its own EPHEMERAL schema
# (wamn_pinproof) through the superuser url — no shared-schema mutation, dropped
# at the end. It applies the deploy/sql/{run-state,flows,flow-tests}.sql tables via
# the SAME publish-catalog --runstate ensure_* path production uses, seeds a
# full-capture run carrying a secret + volatile fields, pins it via the REAL
# wamn-ctl pin-run core, and asserts secret scrubbing + normalization + the replay
# round-trip (volatile mutation still passes, real mutation fails) + the
# preview-run refusal.
# Co-located with postgres, NO cpu limit (the S2 CFS lesson). Run bench/proof Jobs
# SEQUENTIALLY on the shared postgres.
#
#   kubectl -n wamn-system apply -f deploy/gates/pinproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/pinproof --timeout=120s
#   kubectl -n wamn-system logs job/pinproof
apiVersion: batch/v1
kind: Job
metadata:
  name: pinproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: pinproof
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres.wamn-system.svc.cluster.local 5432; do sleep 1; done"]
      containers:
        - name: pinproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "pinproof",
            ]
          env:
            # App reads/writes: the non-superuser, non-BYPASSRLS role (RLS-scoped).
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to provision/drop the ephemeral schema.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
