# [9.8] in-cluster OTel metric-set gate (gate of record). Runs the metricbench
# subcommand of the wamn-gates image (SR1) against the real OTel Collector + the
# in-cluster Postgres: it drives the production run/queue/pool/memory emission
# seams, then scrapes the collector's Prometheus app-metrics endpoint (:8889, the
# 9.8 pipeline added to deploy/infra/otel-collector.yaml) and asserts each
# wamn_* family. Local docker runs (docs/metrics.md) are for iteration.
#
#   kubectl -n wamn-system apply -f deploy/infra/otel-collector.yaml
#   kubectl -n wamn-system rollout status deploy/otel-collector --timeout=120s
#   kubectl -n wamn-system apply -f deploy/gates/metricbench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/metricbench --timeout=300s
#   kubectl -n wamn-system logs job/metricbench
#
# metricbench drives the flowrunner GUEST (run drives + their DB writes) and a
# real Dispatcher tick against ONE ephemeral schema (the runner-DDL union of the
# flow tables + run_queue), provisioned/dropped through the Postgres superuser
# (WAMN_PG_ADMIN_URL — wamn_app is NOSUPERUSER/NOCREATEDB). Phase 6 (api RPS) is
# honest-skipped: wamn_api_requests needs the deployed api-gateway (ProxyPre
# benches bypass the host HTTP server) — see apiproof/traceproof for that surface.
apiVersion: batch/v1
kind: Job
metadata:
  name: metricbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: metricbench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres (the S2 topology convention): the run drives make
      # real DB round trips; keep them off the cross-node overlay hop.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            # The collector's OTLP ingest (:4317) AND its app-metrics scrape
            # (:8889) plus Postgres must all be up before the gate drives.
            - "until nc -z otel-collector 4317 && nc -z otel-collector 8889 && nc -z postgres 5432; do echo waiting for collector+postgres; sleep 1; done"
      containers:
        - name: metricbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "info"          # OTLP metric export activates on OTEL_*; keep info
            - "metricbench"
            - "--flowrunner"
            - "/bench/flowrunner.wasm"
            - "--metrics-url"
            - "http://otel-collector:8889/metrics"
          env:
            # Runner/dispatcher pool: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to provision/drop the ephemeral schema.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
            # Host/run metrics -> OTLP/gRPC -> this collector -> Prometheus :8889.
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector:4317" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "grpc" }
            # Flush metrics every 1s (default 60s) so the bounded scrape poll is short.
            - { name: OTEL_METRIC_EXPORT_INTERVAL, value: "1000" }
            # Keep stderr fmt quiet while the OTLP metric export stays on.
            - { name: RUST_LOG, value: "error" }
          resources:
            # No CPU limit on purpose (the S2 CFS lesson): a quota would throttle
            # the runtime and inflate the tail with scheduler stalls. Memory capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
