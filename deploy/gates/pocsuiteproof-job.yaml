# POC-TESTS in-cluster gate of record (wamn-3rj): pocsuiteproof seeds the F1/F3/F4
# stored suites as catalog data and drives each flow ONCE through its real path,
# folding the stored assertions through wamn_testkit::evaluate (F1 sync-webhook
# body + final DB; F3 virtual-time 48h cutoff; F4 egress spy). It provisions its
# OWN ephemeral schemas (wamn_pocsuiteproof + _f1/_f3/_f4) through the superuser
# url — no shared-schema mutation, all dropped at the end.
#
# Every wasm this gate needs is ALREADY baked into wamn-gates:dev
# (poc-webhook-f1.wasm, flowrunner.wasm, disposition-node.wasm) + the three suite
# JSONs — so a change here needs ONLY the gates image rebaked (`--target gates`),
# never a host or guest rebuild. The F4 serve-node hop + ERP callback listener run
# IN-PROCESS on loopback ports 18191/18192 — no external Service.
#
# Co-located with postgres, NO cpu limit (the S2 CFS lesson). Run bench/proof Jobs
# SEQUENTIALLY on the shared postgres.
#
#   kubectl -n wamn-system apply -f deploy/gates/pocsuiteproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/pocsuiteproof --timeout=300s
#   kubectl -n wamn-system logs job/pocsuiteproof
apiVersion: batch/v1
kind: Job
metadata:
  name: pocsuiteproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: pocsuiteproof
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres.wamn-system.svc.cluster.local 5432; do sleep 1; done"]
      containers:
        - name: pocsuiteproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "pocsuiteproof",
              "--webhook-entry", "/bench/poc-webhook-f1.wasm",
              "--flowrunner", "/bench/flowrunner.wasm",
              "--node", "/bench/disposition-node.wasm",
            ]
          env:
            # App reads/writes: the non-superuser, non-BYPASSRLS role (RLS-scoped).
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used to provision/drop the ephemeral schemas + run
            # the DB-state assertion queries.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
