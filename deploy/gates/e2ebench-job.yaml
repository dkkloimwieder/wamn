# l5i9.22 in-cluster EVT-C-E2E campaign (the outbox-vs-CDC before/after chart —
# MEASURED, not gated): commit->run-start distribution, fan-out 1->N, and a 10x
# burst, each vs BOTH real paths at identical write load. ONE writer program
# feeds the real wamn_dispatcher over the REAL outbox triggers (old arm) AND the
# embedded real wamn-cdc-reader -> DATA-PLANE JetStream (Service `evt-nats`) ->
# the image's /bench/materializer.wasm (new arm). Only structural sanity asserts
# gate (both paths produced exactly N runs); the curves land in the job log's
# `=== BEGIN CSV ce2e-* ===` blocks (docs/ceilings.md § C-E2E). Local docker
# runs are for iteration: docs/build-and-test.md [EVT-C-E2E].
#
#   kubectl -n wamn-system apply -f deploy/gates/e2ebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/e2ebench --timeout=600s
#   kubectl -n wamn-system logs job/e2ebench
#
# ISOLATION: e2ebench owns the throwaway DATABASE `wamn_e2ebench` (it creates
# and drops it itself — the SUPERUSER url is the whole point: the slot, the
# replication role, and the database are bench-scoped residue-free). It needs
# the fixture Postgres to run `wal_level=logical` (deploy/platform/postgres.yaml
# carries the knob). The EVT stream it creates (`EVT_e2e_dev`) is deleted on the
# way out — the standing evt-nats keeps no bench streams behind.
#
# MUST run BEFORE EVT-TEARDOWN (l5i9.19): it needs the OLD outbox path alive to
# measure the before/after.
apiVersion: batch/v1
kind: Job
metadata:
  name: e2ebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: e2ebench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the poll/fire/ack transaction and the fire
      # transaction are multi-round-trip; keep them off the overlay hop.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z evt-nats 4222; do echo waiting for postgres+evt-nats; sleep 1; done"
      containers:
        - name: e2ebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "e2ebench"
            - "--component"
            - "/bench/materializer.wasm"
            - "--admin-database-url"
            - "postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/postgres"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
          resources:
            # No CPU limit on purpose (the S2 CFS-throttling lesson); memory capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
