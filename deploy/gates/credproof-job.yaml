# [5.9] The credential-vault gate of record (wamn-17o): credproof seeds one
# manual run of deploy/cred/notify.flow.json and waits for the DEPLOYED
# run-worker (deploy/platform/runner.yaml + the wamn-runner-credentials Secret) to
# drive it against serve-echo (deploy/gates/serve-echo.yaml), then asserts DELIVERY
# (the reflected authorization header == the vault secret) and CONTAINMENT
# (the secret appears in no recorded run/node_run/graph row outside the http
# node's own echo output). Prereqs: the demo schema provisioned + the flow
# registered (the fqg.8/ojm provisioning recipe), runner + serve-echo up.
#
#   kubectl -n wamn-system apply -f deploy/gates/credproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/credproof --timeout=180s
#   kubectl -n wamn-system logs job/credproof
apiVersion: batch/v1
kind: Job
metadata:
  name: credproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: credproof }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - >-
              until nc -z postgres 5432; do echo waiting for postgres; sleep 1; done;
              until nc -z serve-echo 8091; do echo waiting for serve-echo; sleep 1; done
      containers:
        - name: credproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: WAMN_PG_URL
              valueFrom:
                secretKeyRef:
                  name: wamn-runner-db
                  key: url
          args:
            - "--log-level"
            - "error"
            - "credproof"
            - "--schema"
            - "wamn_runner_demo"
            - "--tenant"
            - "demo-tenant"
            - "--echo-url"
            - "http://serve-echo:8091"
            - "--timeout-secs"
            - "60"
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
