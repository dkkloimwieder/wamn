# 5.14 in-cluster failover gate (gate of record): checkpoint/resume on replica
# loss. Runs the failoverbench subcommand of wamn-gates image (SR1: gates ride their own image layered on the prod host stage), against the in-cluster Postgres (deploy/platform/postgres.yaml). Local docker
# runs are for iteration (throwaway Postgres).
#
#   kubectl -n wamn-system apply -f deploy/gates/failoverbench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/failoverbench --timeout=300s
#   kubectl -n wamn-system logs job/failoverbench
#
# failoverbench drives the flowrunner GUEST (reconstruction) and raw tokio_postgres
# claimers (the run_queue reclaim) against ONE ephemeral schema that unions the flow
# tables with run_queue. It provisions/drops that schema through the Postgres
# superuser (WAMN_PG_ADMIN_URL — wamn_app is NOSUPERUSER/NOCREATEDB and cannot
# create schemas). No NATS: failover uses no doorbell.
apiVersion: batch/v1
kind: Job
metadata:
  name: failoverbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: failoverbench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the reclaim/resume cycles make real DB round
      # trips; pinning the Job to the Postgres node keeps those off the cross-node
      # overlay hop (see the S2/S3 job rationale).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo waiting for postgres; sleep 1; done"
      containers:
        - name: failoverbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "failoverbench"
            - "--flowrunner"
            - "/bench/flowrunner.wasm"
            - "--mode"
            - "all"
          env:
            # Runner/claimer pool: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to provision/drop the ephemeral schema.
            - name: WAMN_PG_ADMIN_URL
              value: postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/wamn
          resources:
            # No CPU limit on purpose: a CFS quota would throttle the runtime and
            # inflate the tail with scheduler stalls rather than real work — the
            # S2 CFS lesson. Memory is capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
