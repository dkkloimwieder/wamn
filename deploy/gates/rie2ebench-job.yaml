# wamn-3glr in-cluster [EVT-RI-E2E] gate: reader-inclusive REPLICA IDENTITY
# flip e2e (the coverage cutbench's phase 3 carried before the l5i9.19
# teardown). Embeds the REAL wamn-cdc-reader (`run_with_token`) next to the
# image's /bench/materializer.wasm over a gate-owned throwaway database on the
# fixture Postgres + the DATA-PLANE JetStream (Service `evt-nats`): pre-flip
# DELETE refused (tenant-unscopable), reconcile flips RI→FULL, post-flip
# DELETE fires ONE scoped :evt: run off the real decoded WAL old image;
# non-retroactive boundary asserted. Local docker runs are for iteration:
# docs/build-and-test.md [EVT-RI-E2E].
#
#   kubectl -n wamn-system apply -f deploy/gates/rie2ebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/rie2ebench --timeout=600s
#   kubectl -n wamn-system logs job/rie2ebench
#
# ISOLATION: rie2ebench owns the throwaway DATABASE `wamn_rie2e` (created and
# dropped WITH (FORCE) by the gate — the SUPERUSER url is the whole point: the
# slot, the database, and the EVT stream are gate-scoped residue-free). It
# needs the fixture Postgres to run `wal_level=logical`
# (deploy/platform/postgres.yaml carries the knob since l5i9.18).
apiVersion: batch/v1
kind: Job
metadata:
  name: rie2ebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: rie2ebench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the reader stream + the flip + the drain are
      # multi-round-trip; keep them off the overlay hop.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z evt-nats 4222; do echo waiting for postgres+evt-nats; sleep 1; done"
      containers:
        - name: rie2ebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "rie2ebench"
            - "--component"
            - "/bench/materializer.wasm"
            - "--admin-database-url"
            - "postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/postgres"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
          resources:
            # No CPU limit on purpose (the S2 CFS-throttling lesson); memory capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
