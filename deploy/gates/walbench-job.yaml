# EVT-C-WAL-0 pre-CDC WAL-volume baseline (wamn-l5i9.4): the walbench
# subcommand — a MEASUREMENT run (per-op WAL bytes/op across narrow + wide
# TOASTy row shapes; representative receiving-event write mix → WAL bytes/s),
# the denominator every later C-CDC WAL-delta claim (wamn-l5i9.14) divides by.
# NOT a regression gate. Only the sanity asserts gate: the run is genuinely
# pre-CDC (no publication/slot, every table at DEFAULT replica identity), every
# op moved WAL (the pg_current_wal_insert_lsn instrument self-check), op counts
# exact.
#
#   kubectl -n wamn-system apply -f deploy/gates/walbench-job.yaml
#   kubectl -n wamn-system logs -f job/walbench
#
# The curves land in the logs as `=== BEGIN CSV <name> ===` blocks; extract
# them into docs/ceilings-data/ (cwal0-perop / cwal0-mixed) and cite them from
# docs/ceilings.md (§ C-WAL-0: date, env, git rev, knobs, pre-CDC assert
# result, raw-data pointer). A single run is the record (the C2 practice): no
# knee search a one-sided disk stall can poison — the headline numbers are byte
# counts and medians. No NATS. The fixture pod runs fsync=off/synchronous_commit
# =off, so WAL byte counts are exact (insert position) while latencies exclude
# per-commit fsync — recorded in the provenance.
apiVersion: batch/v1
kind: Job
metadata:
  name: walbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  # perop (1000 ops × 6 batches) + mixed (2 rates × 60 s) ≈ a few minutes.
  activeDeadlineSeconds: 1200
  template:
    metadata:
      labels: { app: walbench }
    spec:
      restartPolicy: Never
      # Co-located with Postgres, same topology class as every p0 reference
      # number (the S2 rationale, matching C2/C7).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo waiting for postgres; sleep 1; done"
      containers:
        - name: walbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "walbench"
            - "--mode"
            - "all"
            # Record knobs: 1000 single-row ops/batch; representative receiving-
            # event load at 20 + 50 events/s for 60 s each; 3 lines/event;
            # 6 KiB incompressible display_name for the wide/TOASTy leg.
            - "--iters"
            - "1000"
            - "--mixed-rates"
            - "20,50"
            - "--mixed-secs"
            - "60"
          env:
            # Writer: the non-superuser, non-BYPASSRLS app role (writes under
            # the production RLS floor).
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: schema provisioning, VACUUM / CHECKPOINT, WAL LSN reads,
            # the pre-CDC provenance probe, TRUNCATE between rates.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            # No CPU limit on purpose (the S2 CFS lesson): a quota would
            # throttle the writer and measure the scheduler, not the WAL.
            requests: { cpu: "1", memory: "256Mi" }
            limits: { memory: "1Gi" }
