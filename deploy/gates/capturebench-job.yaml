# 9.6 node-level I/O capture gates (gate of record, wamn-srb). Runs the
# capturebench subcommand of the wamn-gates image (SR1: gates ride their own
# image layered on the prod host stage), against the in-cluster Postgres
# (deploy/platform/postgres.yaml). Local docker runs are for iteration (throwaway
# Postgres).
#
#   kubectl -n wamn-system apply -f deploy/gates/capturebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/capturebench --timeout=300s
#   kubectl -n wamn-system logs job/capturebench
#
# capturebench is pure host-side (no wasm guest — it applies the REAL
# deploy/sql/run-state.sql into a throwaway schema and drives the SAME pure
# capture logic + node_runs insert builders the flowrunner guest binds): it
# provisions the schema through the Postgres superuser (WAMN_PG_ADMIN_URL —
# wamn_app is NOSUPERUSER/NOCREATEDB) and writes/prunes as the wamn_app role.
# Modes: toggle (NULL payloads + CaptureOff), truncate (oversized -> preview
# head/size/hash), scrub (secret nowhere in node_runs), retention (the real
# prune-run-history verb), all.
apiVersion: batch/v1
kind: Job
metadata:
  name: capturebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: capturebench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the writes + prune make real DB round trips;
      # pinning the Job to the Postgres node keeps those off the cross-node
      # overlay hop (S2/S3 rationale).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo waiting for postgres; sleep 1; done"
      containers:
        - name: capturebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "capturebench"
            - "--mode"
            - "all"
          env:
            # node_runs writer + prune: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to apply/drop the ephemeral run-state schema.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits: { memory: "512Mi" }
