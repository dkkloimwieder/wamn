# l5i9.17 in-cluster materializer gate (gate of record, decide/enqueue half).
# Runs the matbench subcommand of the wamn-gates image against the in-cluster
# fixture Postgres (deploy/platform/postgres.yaml) and the DATA-PLANE JetStream
# (Service `evt-nats`, no mTLS — matbench's stream AND its doorbell observation
# both ride it; the production doorbell path over the control-plane NATS is
# separately proven by the deployed-Service e2e). Local docker runs are for
# iteration (throwaway Postgres + throwaway NATS): docs/build-and-test.md
# [EVT-MAT].
#
#   kubectl -n wamn-system apply -f deploy/gates/matbench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/matbench --timeout=600s
#   kubectl -n wamn-system logs job/matbench
#
# ISOLATION: matbench applies the REAL deploy/sql DDL (schemas wamn_run +
# catalog, include_str!-compiled), so it must own its DATABASE — the init
# container drops/creates `wamn_matbench` on the fixture pod (never the shared
# `wamn` db, whose wamn_run schema is live demo state). The guest wasm is the
# image's /bench/materializer.wasm — the same component the WorkloadDeployment
# pulls from the registry.
apiVersion: batch/v1
kind: Job
metadata:
  name: matbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: matbench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the fire transaction is two round trips per
      # event; pinning the Job to the Postgres node keeps them off the
      # cross-node overlay hop (the S2/S3 rationale).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z evt-nats 4222; do echo waiting for postgres+evt-nats; sleep 1; done"
        # A throwaway DATABASE per run: matbench's DDL apply owns wamn_run +
        # catalog inside it. DROP ... WITH (FORCE) clears a crashed prior run's
        # connections; each -c is its own autocommit statement (CREATE DATABASE
        # cannot run in a transaction).
        - name: provision-db
          image: postgres:18
          command:
            - psql
            - postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/postgres
            - -v
            - ON_ERROR_STOP=1
            - -c
            - DROP DATABASE IF EXISTS wamn_matbench WITH (FORCE)
            - -c
            - CREATE DATABASE wamn_matbench
          env:
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
      containers:
        - name: matbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "matbench"
            - "--component"
            - "/bench/materializer.wasm"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
          env:
            # The guest's pool: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn_matbench
            # Admin: superuser, used ONLY to apply/drop the throwaway schemas.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn_matbench
          resources:
            # No CPU limit on purpose (the S2 CFS-throttling lesson); memory capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
