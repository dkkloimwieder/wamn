# EVT-NATS in-cluster gate of record (wamn-l5i9.7). Runs the streambench
# subcommand of the wamn-gates image against the dedicated data-plane JetStream
# cluster (deploy/infra/nats-jetstream.yaml, Service `evt-nats`) — NOT the operator /
# control-plane NATS (Service `nats`), which is untouched.
#
# Primary functional + self-contained R3 gate (publish / consume / Nats-Msg-Id
# dedupe / leader-stepdown re-election):
#
#   kubectl -n wamn-system apply -f deploy/infra/nats-jetstream.yaml
#   kubectl -n wamn-system rollout status statefulset/evt-nats --timeout=180s
#   kubectl -n wamn-system apply -f deploy/gates/streambench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/streambench --timeout=180s
#   kubectl -n wamn-system logs job/streambench
#
# PHYSICAL node-loss gate of record (R3 survives a pod deletion) — the two-step
# runbook using throwaway pods on the same image:
#
#   kubectl -n wamn-system run streambench-pub --rm -i --restart=Never \
#     --image=wamn-gates:dev --image-pull-policy=IfNotPresent -- \
#     --log-level error streambench --mode publish \
#     --nats-url nats://evt-nats.wamn-system.svc.cluster.local:4222 --replicas 3 -n 500
#   kubectl -n wamn-system delete pod evt-nats-2            # destroy one of three
#   kubectl -n wamn-system run streambench-heal --rm -i --restart=Never \
#     --image=wamn-gates:dev --image-pull-policy=IfNotPresent -- \
#     --log-level error streambench --mode heal \
#     --nats-url nats://evt-nats.wamn-system.svc.cluster.local:4222 \
#     --replicas 3 --expect-messages 500
#   kubectl -n wamn-system rollout status statefulset/evt-nats --timeout=120s   # let it rejoin
#
# streambench is a pure NATS client (no wasm, no Postgres): no co-location, no
# mTLS mount (the data-plane NATS runs on the single shared account — per-org
# accounts + replication credentials are the wamn-4xw seam).
apiVersion: batch/v1
kind: Job
metadata:
  name: streambench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: streambench }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z evt-nats 4222; do echo waiting for data-plane nats; sleep 1; done"
      containers:
        - name: streambench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "streambench"
            - "--mode"
            - "all"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
            - "--replicas"
            - "3"
            - "--messages"
            - "500"
          resources:
            # No CPU limit (the S2 CFS lesson); memory capped.
            requests: { cpu: "500m", memory: "128Mi" }
            limits: { memory: "512Mi" }
