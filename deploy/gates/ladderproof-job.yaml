# Exec-ladder (wamn-ojm) — the DEPLOYED-runner conformance gate of record.
# Seeds ONE manual run into the demo schema and waits for the deployed
# `run-worker` service (deploy/platform/runner.yaml) to claim + drive it, then asserts the
# run completed correctly (result + per-node execution trace). A pure client — it
# proves the deployed runner executes a flow correctly, OUTSIDE a bench harness.
#
# `--rung` selects which flow to prove (3 = the rung-3 conditional branch + merge,
# proving correct ROUTING over two runs [a true and a false input]; edit to "2"
# for the rung-2 linear transform chain or "1" for the single-node rung-1
# regression). All flows coexist active in the demo schema (distinct flow ids).
#
# Prerequisites (the demo schema + flows must exist and the runner must be live):
#   # 1. provision the demo schema (run-state + run-queue + flows), additive:
#   #    sed 's/\bwamn_run\b/wamn_runner_demo/g' over deploy/{run-state,run-queue,flows}.sql
#   #    | kubectl -n wamn-system exec -i <postgres-pod> -- psql -U postgres -d wamn
#   # 2. register deploy/gates/ladder/rung1.flow.json + rung2.flow.json + rung3.flow.json active (tenant demo-tenant)
#   # 3. kubectl -n wamn-system apply -f deploy/platform/runner-db.example.yaml -f deploy/platform/runner.yaml
#   kubectl -n wamn-system apply -f deploy/gates/ladderproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/ladderproof --timeout=120s
#   kubectl -n wamn-system logs job/ladderproof
apiVersion: batch/v1
kind: Job
metadata:
  name: ladderproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ladderproof
    spec:
      restartPolicy: Never
      containers:
        - name: ladderproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "ladderproof",
              "--rung", "3",
              "--schema", "wamn_runner_demo",
              "--tenant", "demo-tenant",
              "--timeout-secs", "60",
            ]
          env:
            # The project's app (wamn_app) URL — the same Secret the runner uses,
            # so the seed lands under the same tenant/RLS floor the runner claims
            # under.
            - name: WAMN_PG_URL
              valueFrom:
                secretKeyRef:
                  name: wamn-runner-db
                  key: url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
