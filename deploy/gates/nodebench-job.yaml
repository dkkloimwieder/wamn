# S4 in-cluster custom-node gates. Runs the nodebench subcommand of the same
# wamn-gates image (SR1). This is the gate of record for D7; local
# docker runs are for iteration.
#
# The hop gate points at the serve-node-gate Service, so it measures a REAL cross-pod
# HTTP round trip (apply deploy/gates/serve-node.yaml first). The gap (interpreted vs
# composed) and config-parse gates run in-pod (no external dependency). No DB.
#
#   kubectl -n wamn-system apply -f deploy/gates/serve-node.yaml
#   kubectl -n wamn-system rollout status deploy/serve-node-gate --timeout=120s
#   kubectl -n wamn-system apply -f deploy/gates/nodebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/nodebench --timeout=300s
#   kubectl -n wamn-system logs job/nodebench
apiVersion: batch/v1
kind: Job
metadata:
  name: nodebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: nodebench }
    spec:
      restartPolicy: Never
      # Wait for serve-node-gate to accept connections before the hop gate runs.
      initContainers:
        - name: wait-serve-node-gate
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z serve-node-gate 8080; do echo waiting for serve-node-gate; sleep 1; done"
      containers:
        - name: nodebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "nodebench"
            - "--node-rs"
            - "/bench/node-rs.wasm"
            - "--node-ts"
            - "/bench/node-ts.wasm"
            - "--composed"
            - "/bench/flow-composed.wasm"
            - "--mode"
            - "all"
            - "--hop-url"
            - "serve-node-gate:8080"
          resources:
            # No CPU limit (CFS-quota tail artifact — see pgbench/flowbench).
            # StarlingMonkey (node-ts) is ~12 MiB + runtime, so give it room.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
