# POC-F1 in-cluster gate of record: f1bench drives poc_webhook_f1.wasm +
# api_gateway.wasm in-proc (ProxyPre) against the shared postgres, provisioning
# its own EPHEMERAL schema (wamn_f1_bench) through the superuser url — no
# shared-schema mutation. Co-located with postgres, NO cpu limit (the S2 CFS
# lesson). Run bench Jobs SEQUENTIALLY on the shared postgres.
apiVersion: batch/v1
kind: Job
metadata:
  name: f1bench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: f1bench
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres.wamn-system.svc.cluster.local 5432; do sleep 1; done"]
      containers:
        - name: f1bench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "f1bench",
              "--webhook-entry", "/bench/poc-webhook-f1.wasm",
              "--api-gateway", "/bench/api-gateway.wasm",
              "--mode", "all",
            ]
          env:
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
