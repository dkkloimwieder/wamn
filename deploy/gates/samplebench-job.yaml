# l5i9.57 E10-e2e in-cluster wamn:jetstream sample gate. Runs the samplebench
# subcommand of the wamn-gates image against the DATA-PLANE JetStream (Service
# `evt-nats`, no mTLS) — the same real R3 stream cluster the materializer and
# the CDC reader use. Unlike matbench this needs NO Postgres: the js-sample
# guest imports only wamn:jetstream (consumer + producer), so the whole gate is
# a component driving JetStream bind/fetch/ack/publish/dedupe/reject in-proc.
# Local docker runs are for iteration (throwaway NATS): docs/build-and-test.md
# [E10-E2E].
#
#   kubectl -n wamn-system apply -f deploy/gates/samplebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/samplebench --timeout=300s
#   kubectl -n wamn-system logs job/samplebench
#
# ISOLATION: samplebench creates its OWN throwaway streams (WAMN_SAMPLEBENCH_IN
# / WAMN_SAMPLEBENCH_OUT, distinct subject spaces evt.sample.> / derived.sample.>)
# and deletes them on completion, so it never touches a production EVT_ stream.
# The guest wasm is the image's /bench/js-sample.wasm.
apiVersion: batch/v1
kind: Job
metadata:
  name: samplebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: samplebench }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z evt-nats 4222; do echo waiting for evt-nats; sleep 1; done"
      containers:
        - name: samplebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "samplebench"
            - "--component"
            - "/bench/js-sample.wasm"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
          resources:
            # No CPU limit on purpose (the S2 CFS-throttling lesson); memory capped.
            requests: { cpu: "1", memory: "256Mi" }
            limits: { memory: "512Mi" }
