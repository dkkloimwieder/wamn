# 11.8 in-cluster gate: impactproof drives schema-change impact analysis
# (wamn-wvb) against the shared postgres, provisioning its own EPHEMERAL schema
# (wamn_impactproof) through the superuser url — no shared-schema mutation, dropped
# at the end. It applies the deploy/sql/flows.sql + flow-tests.sql tables via the
# SAME publish-catalog --runstate ensure_* path production uses, seeds one active
# flow whose postgres node names entity `orders` by NAME + a version-bound suite,
# then folds a v1->v2 (drop-column) plan through wamn_impact::analyze and asserts
# the report names the affected flow/suite/api resource and gates a destructive
# change with dependents behind acknowledgement (an additive change does not).
# The event-registration edge (shared catalog.event_registrations) is proven by
# the throwaway-PG live gate, not here. Co-located with postgres, NO cpu limit (the
# S2 CFS lesson). Run bench/proof Jobs SEQUENTIALLY on the shared postgres.
#
#   kubectl -n wamn-system apply -f deploy/gates/impactproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/impactproof --timeout=120s
#   kubectl -n wamn-system logs job/impactproof
apiVersion: batch/v1
kind: Job
metadata:
  name: impactproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: impactproof
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres.wamn-system.svc.cluster.local 5432; do sleep 1; done"]
      containers:
        - name: impactproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "impactproof",
            ]
          env:
            # App reads/writes: the non-superuser, non-BYPASSRLS role (RLS-scoped).
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used to provision/drop the ephemeral schema AND run
            # the cross-tenant (RLS-bypassing) impact reads.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
