# [4.1b] Provision the api-gateway's project data + publish its catalog snapshot.
# Runs the publish-catalog subcommand of wamn-gates image (SR1: gates ride their own image layered on the prod host stage). It connects as the Postgres SUPERUSER (WAMN_PG_ADMIN_URL) to:
#   * create the dedicated `api_proof` schema (additive: CREATE SCHEMA IF NOT
#     EXISTS — never touches the S2/S3 fixtures or any existing object),
#   * --provision the 3.2 tenant floor (suppliers/receipts/receipt_lines) when
#     absent,
#   * --seed the bundled two-tenant demo rows (idempotent),
#   * UPSERT the deploy/poc/proof-catalog.json snapshot under tenant-a into the
#     wamn_catalog table the gateway reads (RLS-scoped, GRANT SELECT to wamn_app).
#
# The catalog JSON is mounted from a ConfigMap built from deploy/poc/proof-catalog.json:
#   kubectl -n wamn-system create configmap proof-catalog \
#     --from-file=proof-catalog.json=deploy/poc/proof-catalog.json
#   kubectl -n wamn-system apply -f deploy/gates/publish-catalog-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/publish-catalog --timeout=120s
#   kubectl -n wamn-system logs job/publish-catalog
apiVersion: batch/v1
kind: Job
metadata:
  name: publish-catalog
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: publish-catalog }
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      containers:
        - name: publish-catalog
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "publish-catalog"
            - "--catalog"
            - "/fixtures/proof-catalog.json"
            - "--tenant"
            - "tenant-a"
            - "--schema"
            - "api_proof"
            - "--provision"
            - "--seed"
          env:
            # Superuser: provisions the schema/floor + writes the RLS-scoped snapshot.
            - name: WAMN_PG_ADMIN_URL
              value: postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/wamn
          volumeMounts:
            - name: fixtures
              mountPath: /fixtures
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { memory: "512Mi" }
      volumes:
        - name: fixtures
          configMap:
            name: proof-catalog
