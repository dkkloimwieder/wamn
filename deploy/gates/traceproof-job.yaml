# [9.2] The in-cluster gate of record: prove host-enforced cross-pod traceparent
# propagation over real networking. traceproof sends a known traceparent to the
# deployed trace-relay (Host = its route); the relay makes a bare outbound call
# to serve-echo, which reflects the traceparent it received. The proof asserts
# the reflected trace id equals the one sent (the trace threaded the boundary)
# and the span id differs (the host minted a child client span). Runs the
# wamn-gates image (SR1) — no external client to pull.
#
# Prereqs: trace-relay WorkloadDeployment Ready + serve-echo rolled out.
#
#   kubectl -n wamn-system apply -f deploy/traceproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/traceproof --timeout=180s
#   kubectl -n wamn-system logs job/traceproof
apiVersion: batch/v1
kind: Job
metadata:
  name: traceproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: traceproof }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z serve-echo 8091; do echo "waiting serve-echo:8091"; sleep 2; done
              until nc -z trace-relay 80; do echo "waiting trace-relay:80"; sleep 2; done
      containers:
        - name: traceproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "traceproof"
            - "--relay-url"
            - "http://trace-relay.wamn-system.svc.cluster.local:80"
            - "--relay-host"
            - "relay.localhost.direct"
            - "--upstream"
            - "http://serve-echo.wamn-system.svc.cluster.local:8091/"
          resources:
            requests: { cpu: "250m", memory: "128Mi" }
            limits: { memory: "256Mi" }
