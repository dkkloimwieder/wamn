# l5i9.18 in-cluster EVT-CUTOVER gate (gate of record): shadow dual-run
# equivalence, then the per-flow cutover flip. ONE write program feeds BOTH
# capture paths — the real outbox triggers + the real wamn_dispatcher engine
# on the old side, a REAL pg_walstream slot + the embedded wamn-cdc-reader +
# the DATA-PLANE JetStream (Service `evt-nats`) + the image's
# /bench/materializer.wasm on the new side. Local docker runs are for
# iteration (throwaway PG18 `wal_level=logical` + throwaway JetStream):
# docs/build-and-test.md [EVT-CUTOVER].
#
#   kubectl -n wamn-system apply -f deploy/gates/cutbench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/cutbench --timeout=600s
#   kubectl -n wamn-system logs job/cutbench
#
# ISOLATION: cutbench owns the throwaway DATABASE `wamn_cutbench` (it creates
# and drops it itself — the SUPERUSER url is the whole point: the slot, the
# replication role, and the database are gate-scoped residue-free). It needs
# the fixture Postgres to run `wal_level=logical` (deploy/platform/postgres.yaml
# carries the knob). The EVT stream it creates (`EVT_cb0_dev`) is deleted on
# the way out — the standing evt-nats keeps no gate streams behind.
apiVersion: batch/v1
kind: Job
metadata:
  name: cutbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: cutbench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the poll/fire/ack transaction and the fire
      # transaction are multi-round-trip; keep them off the overlay hop.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z evt-nats 4222; do echo waiting for postgres+evt-nats; sleep 1; done"
      containers:
        - name: cutbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "cutbench"
            - "--component"
            - "/bench/materializer.wasm"
            - "--admin-database-url"
            - "postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/postgres"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
          resources:
            # No CPU limit on purpose (the S2 CFS-throttling lesson); memory capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
