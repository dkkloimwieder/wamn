# [9.1] in-cluster OTel trace-pipeline gate (gate of record). Runs the
# tracebench subcommand of the wamn-gates image (SR1) against the real OTel
# Collector + Tempo, driving a real guest DB call on the in-cluster Postgres.
# Local docker runs (docs/tracing.md) are for iteration.
#
# The gate drives pgprobe op 6 (SELECT pg_sleep(0)) under the real
# wamn_host::dispatch::trigger_span; the wamn:postgres plugin's DB span nests
# under it; both export via OTLP/gRPC → the collector's traces pipeline → Tempo,
# then tracebench queries Tempo's TraceQL API and asserts the enriched single
# trace (trigger → wamn:postgres). No fixture / no DDL — pg_sleep is
# schema-free, so this is additive on the shared Postgres (the guardrail).
#
#   kubectl -n wamn-system apply -f deploy/infra/tempo.yaml -f deploy/infra/otel-collector.yaml
#   kubectl -n wamn-system rollout status deploy/tempo deploy/otel-collector --timeout=120s
#   kubectl -n wamn-system apply -f deploy/gates/tracebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/tracebench --timeout=180s
#   kubectl -n wamn-system logs job/tracebench
apiVersion: batch/v1
kind: Job
metadata:
  name: tracebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: tracebench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres (the S2 topology convention); the DB call is a
      # trivial pg_sleep(0), but keeping the gates on one node with their DB
      # matches the other benches.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-pipeline
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z otel-collector 4317 && nc -z tempo 3200 && nc -z postgres 5432; do echo waiting for collector+tempo+postgres; sleep 1; done"
      containers:
        - name: tracebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "info"          # OTLP trace filter is level-tied; the spans are info
            - "tracebench"
            - "--pgprobe"
            - "/bench/pgprobe.wasm"
            - "--mode"
            - "all"
          env:
            # Host spans -> OTLP/gRPC -> this collector -> Tempo.
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://otel-collector:4317" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "grpc" }
            # Flush single-trace batches fast (default 5s) so the bounded poll is short.
            - { name: OTEL_BSP_SCHEDULE_DELAY, value: "1000" }
            # Keep stderr fmt quiet while the OTLP trace filter stays at info.
            - { name: RUST_LOG, value: "error" }
            # The guest DB call target (wamn_app; pg_sleep needs no fixture).
            - { name: WAMN_PG_URL, value: "postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn" }
            # Tempo's TraceQL query API.
            - { name: TEMPO_URL, value: "http://tempo:3200" }
          resources:
            # No CPU limit (CFS-quota tail artifact — the S2 lesson).
            requests: { cpu: "1", memory: "512Mi" }
            limits: { memory: "1Gi" }
