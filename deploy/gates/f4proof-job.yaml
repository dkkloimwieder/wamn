# wamn-lxk in-cluster [POC-F4] gate: the CDC row-event flow + 429-throttle
# end-to-end proof, and the EVT-CUTOVER regression by construction. Embeds the
# REAL wamn-cdc-reader (`run_with_token`) + the image's /bench/materializer.wasm
# + the production RunWorker driving /bench/flowrunner.wasm + a serve-node
# hosting /bench/disposition-node.wasm + the ERP callback simulator — ALL
# in-process on loopback (no external Service), over a gate-owned throwaway
# database on the fixture Postgres + the DATA-PLANE JetStream (Service
# `evt-nats`). ONE `INSERT INTO dispositions` drives reader → materializer →
# run queue → runner → F2 hop → ERP callback; the ERP sim 429s the first
# request per idempotency key, so the gate asserts the queue-park backoff (no
# stampede, exactly-one effective delivery). Local docker runs are for
# iteration: docs/build-and-test.md [POC-F4].
#
#   kubectl -n wamn-system apply -f deploy/gates/f4proof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/f4proof --timeout=600s
#   kubectl -n wamn-system logs job/f4proof
#
# ISOLATION: f4proof owns the throwaway DATABASE `wamn_f4proof` (created and
# dropped WITH (FORCE) by the gate — the SUPERUSER url is the whole point: the
# slot, the database, the replication role, and the EVT stream are gate-scoped
# residue-free). It needs the fixture Postgres to run `wal_level=logical`
# (deploy/platform/postgres.yaml carries the knob since l5i9.18). The serve-node
# + ERP sim are in-process on loopback (127.0.0.1:8191 / :8192), so NO external
# Service and NO platform runner.yaml allowed-hosts change is required — the
# gate sets its in-process runner's allowlist in code.
apiVersion: batch/v1
kind: Job
metadata:
  name: f4proof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: f4proof }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the reader stream + the materialize + the drain
      # are multi-round-trip; keep them off the overlay hop.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z evt-nats 4222; do echo waiting for postgres+evt-nats; sleep 1; done"
      containers:
        - name: f4proof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "f4proof"
            - "--component"
            - "/bench/materializer.wasm"
            - "--flowrunner"
            - "/bench/flowrunner.wasm"
            - "--node"
            - "/bench/disposition-node.wasm"
            - "--admin-database-url"
            - "postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/postgres"
            - "--nats-url"
            - "nats://evt-nats.wamn-system.svc.cluster.local:4222"
          env:
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
          resources:
            # No CPU limit on purpose (the S2 CFS-throttling lesson); memory capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
