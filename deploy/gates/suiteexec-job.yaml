# 11.2-exec in-cluster gate of record (wamn-0lfu): suiteexec drives the STORED
# test-suite EXECUTOR — load test_suites/test_cases rows from a schema, re-validate
# each case against the wamn-testkit vocabulary, and execute each as its OWN run
# through the t92 doubles seam (fresh ephemeral schema per case, graph from
# {source}.flows, DoubleSet::virtual_host + EgressRecorder + RunWorker + drain,
# then wamn_testkit::evaluate).
#
# HERMETIC: `--seed-demo` is the "SQL preamble" — the executor self-seeds its own
# THROWAWAY source schema (wamn_suiteexec, NOT poc_f1) via the SAME
# publish-catalog `ensure_*` path production provisioning uses: a drivable
# NO-EGRESS demo flow (webhook-in -> pg-write -> respond) + a 2-case suite. It
# then runs the --suite path against that schema and drops it at the end. No
# external fixture data, no live egress target — one binary invocation. (An
# initContainer psql preamble would have to duplicate the ensure_* DDL + the
# exact envelope shapes; the in-process seed reuses the proven code instead.)
#
# The per-case EXECUTION schemas (tk_suiteexec_<n>) are provisioned through the
# superuser (WAMN_PG_ADMIN_URL) — wamn_app is NOSUPERUSER/NOCREATEDB and cannot
# create schemas, exactly as in production — and dropped at case teardown. The
# db-state asserts read through that same superuser session (RLS-bypassing).
#
# Co-located with postgres (the cases make real DB round trips), backoffLimit 0,
# restartPolicy Never, image wamn-gates:dev. Run bench/proof Jobs SEQUENTIALLY on
# the shared postgres.
#
#   kubectl -n wamn-system apply -f deploy/gates/suiteexec-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/suiteexec --timeout=180s
#   kubectl -n wamn-system logs job/suiteexec
apiVersion: batch/v1
kind: Job
metadata:
  name: suiteexec
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: suiteexec
    spec:
      restartPolicy: Never
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres.wamn-system.svc.cluster.local 5432; do sleep 1; done"]
      containers:
        - name: suiteexec
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "testkitbench",
              "--seed-demo",
              "--tenant", "demo-tenant",
              "--source-schema", "wamn_suiteexec",
              "--exec-schema", "tk_suiteexec",
              "--flowrunner", "/bench/flowrunner.wasm",
            ]
          env:
            # Runner pool: the non-superuser, non-BYPASSRLS app role (RLS-scoped).
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser — provisions/drops the source + per-case exec
            # schemas AND runs the db-state assertion queries.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
