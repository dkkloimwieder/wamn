# [2.3] in-cluster provisioning gate of record. Runs the `provisionbench`
# subcommand of the wamn-gates image against the shared CloudNativePG cluster
# (deploy/infra/cnpg-cluster.yaml — the D6 substrate), through its superuser secret.
# provisionbench provisions two projects via the production provision-project
# path, then proves routing/resolution, database-level isolation, least
# privilege, and the emitted credential layout. Self-contained: the gate-owned
# project databases are dropped on teardown; the CNPG cluster is never recreated.
#
#   kubectl -n wamn-system apply -f deploy/gates/provisionbench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/provisionbench --timeout=180s
#   kubectl -n wamn-system logs job/provisionbench
apiVersion: batch/v1
kind: Job
metadata:
  name: provisionbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: provisionbench }
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-cnpg
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z wamn-pg-rw 5432; do echo waiting for cnpg; sleep 1; done"
      containers:
        - name: provisionbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          # Compose the superuser admin URL from the CNPG-managed superuser secret
          # (its `uri` key carries dbname `*`, unusable) targeting the always-
          # present `postgres` maintenance database, then run the gate. CNPG
          # generates alphanumeric passwords, so URL embedding is safe.
          command: ["/bin/sh", "-c"]
          args:
            - |
              export WAMN_PG_ADMIN_URL="postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/postgres?sslmode=disable"
              exec /usr/local/bin/wamn-gates --log-level error provisionbench
          env:
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: wamn-pg-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: wamn-pg-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: wamn-pg-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: wamn-pg-superuser, key: port } }
          resources:
            # No CPU limit (the S2 CFS lesson); this is a correctness gate, memory
            # is modest and capped.
            requests: { cpu: "500m", memory: "256Mi" }
            limits: { memory: "512Mi" }
