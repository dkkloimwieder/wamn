# EVT-C7 ceiling campaign (wamn-z7b.1): the queuebench ceiling MODE — a long
# measurement run (knee ramps on the combined + split lifecycle paths, a
# sustained soak at 80% of knee with a bloat probe, a 10× burst/recovery
# profile), NOT the 5.14 regression gate (that stays deploy/gates/queuebench-job.yaml
# --mode all, which deliberately excludes ceiling).
#
#   kubectl -n wamn-system apply -f deploy/gates/queuebench-ceiling-job.yaml
#   kubectl -n wamn-system logs -f job/queuebench-ceiling
#
# The curves land in the logs as `=== BEGIN CSV <name> ===` blocks; extract
# them into docs/ceilings-data/ and cite them from docs/ceilings.md (§11
# provenance: date, env, git rev, knobs, raw-data pointer). No NATS: the
# ceiling mode never touches the doorbell.
apiVersion: batch/v1
kind: Job
metadata:
  name: queuebench-ceiling
  namespace: wamn-system
spec:
  backoffLimit: 0
  # Four knee ramps (60 s/level + drain) + soak + burst ≈ 60–90 min.
  activeDeadlineSeconds: 7200
  template:
    metadata:
      labels: { app: queuebench-ceiling }
    spec:
      restartPolicy: Never
      # Co-located with Postgres, same topology class as every p0 reference
      # number (the S2 rationale): the measured knee must not include a
      # cross-node overlay hop.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo waiting for postgres; sleep 1; done"
      containers:
        - name: queuebench-ceiling
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            - "--log-level"
            - "error"
            - "queuebench"
            - "--mode"
            - "ceiling"
            # The §10 record knobs: 60 s/level, 250/s base, 5-min soak, 60 s
            # burst (the 30-min soak + fillfactor/autovacuum matrix + 1M-run
            # bloat soak are the phase-2 campaign, wamn-z7b.6).
            - "--level-secs"
            - "60"
            - "--base-rate"
            - "250"
            - "--soak-secs"
            - "300"
            - "--burst-secs"
            - "60"
          env:
            # Producer/claimer pool: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: provisions/drops the ephemeral schema + the bloat probe.
            - name: WAMN_PG_ADMIN_URL
              value: postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/wamn
          resources:
            # No CPU limit on purpose (the S2 CFS lesson): a quota would
            # throttle the load generators and report a scheduler knee, not the
            # queue's. Memory sized for the burst backlog bookkeeping.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "2Gi" }
