# 5.14 in-cluster shared-trigger-dispatcher gates (gate of record). Runs the
# dispatchbench subcommand of the wamn-gates image (SR1: gates ride their own image layered on the prod host stage),
# against the in-cluster Postgres (deploy/postgres.yaml) and the operator NATS
# (Service `nats`, port 4222). Local docker runs are for iteration (throwaway
# Postgres + throwaway NATS).
#
#   kubectl -n wamn-system apply -f deploy/dispatchbench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/dispatchbench --timeout=300s
#   kubectl -n wamn-system logs job/dispatchbench
#
# dispatchbench is pure host-side (no wasm guest — the dispatcher fires runs;
# driving them is the runner's, regression-covered by flowbench/testhostbench):
# it provisions TWO fresh ephemeral schemas as two projects through the Postgres
# superuser (WAMN_PG_ADMIN_URL — wamn_app is NOSUPERUSER/NOCREATEDB) and drives
# the real Dispatcher engine with stepped time (fast-forwardable cron — a
# nightly schedule and a three-day outage gate in milliseconds); the wake/live
# modes publish real NATS-core doorbell hints.
apiVersion: batch/v1
kind: Job
metadata:
  name: dispatchbench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: dispatchbench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the poll/fire/ack co-transactions and the race
      # mode's concurrent claims make real DB round trips; pinning the Job to the
      # Postgres node keeps those off the cross-node overlay hop (S2/S3 rationale).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z nats 4222; do echo waiting for postgres+nats; sleep 1; done"
      # The operator NATS uses mTLS (verify_and_map). Reuse the same runtime cert
      # the host groups connect with; its CN maps to the wasmcloud-runtime NATS
      # user (allow-all subjects), so the doorbell hint subject is permitted.
      volumes:
        - name: runtime-cert
          secret:
            secretName: wasmcloud-runtime-tls
            defaultMode: 420
      containers:
        - name: dispatchbench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: runtime-cert
              mountPath: /runtime-cert
              readOnly: true
          args:
            - "--log-level"
            - "error"
            - "dispatchbench"
            - "--mode"
            - "all"
            - "--nats-url"
            - "nats://nats.wamn-system.svc.cluster.local:4222"
            - "--nats-tls-ca"
            - "/runtime-cert/ca.crt"
            - "--nats-tls-cert"
            - "/runtime-cert/tls.crt"
            - "--nats-tls-key"
            - "/runtime-cert/tls.key"
          env:
            # Dispatcher connections: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to provision/drop the ephemeral schemas.
            - name: WAMN_PG_ADMIN_URL
              value: postgres://postgres:postgres@postgres.wamn-system.svc.cluster.local:5432/wamn
          resources:
            # No CPU limit on purpose: a CFS quota would throttle the runtime and
            # inflate the dispatch tail with scheduler stalls rather than real
            # work — the S2 CFS lesson. Memory is capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
