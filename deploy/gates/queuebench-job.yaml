# 5.14 in-cluster durable-run-queue gates (gate of record). Runs the queuebench
# subcommand of the wamn-gates image (SR1: gates ride their own image layered on the prod host stage), against the
# in-cluster Postgres (deploy/platform/postgres.yaml) and the NATS the runtime-operator
# Helm chart deploys (Service `nats`, port 4222). Local docker runs are for
# iteration (throwaway Postgres + throwaway NATS).
#
#   kubectl -n wamn-system apply -f deploy/gates/queuebench-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/queuebench --timeout=300s
#   kubectl -n wamn-system logs job/queuebench
#
# queuebench is pure host-side (no wasm guest): it provisions a fresh ephemeral
# schema (runs + run_queue) through the Postgres superuser (WAMN_PG_ADMIN_URL —
# wamn_app is NOSUPERUSER/NOCREATEDB and cannot create schemas), then drives raw
# tokio_postgres claimers. The doorbell mode publishes NATS-core hints.
apiVersion: batch/v1
kind: Job
metadata:
  name: queuebench
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: queuebench }
    spec:
      restartPolicy: Never
      # Co-locate with Postgres: the SKIP LOCKED throughput / lease / SLO gates
      # make real DB round trips; pinning the Job to the Postgres node keeps those
      # off the cross-node overlay hop (see the S2/S3 job rationale).
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: postgres }
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432 && nc -z nats 4222; do echo waiting for postgres+nats; sleep 1; done"
      # The operator NATS uses mTLS (verify_and_map). Reuse the same runtime cert
      # the host groups connect with; its CN maps to the wasmcloud-runtime NATS
      # user (allow-all subjects), so the doorbell hint subject is permitted.
      volumes:
        - name: runtime-cert
          secret:
            secretName: wasmcloud-runtime-tls
            defaultMode: 420
      containers:
        - name: queuebench
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: runtime-cert
              mountPath: /runtime-cert
              readOnly: true
          args:
            - "--log-level"
            - "error"
            - "queuebench"
            - "--mode"
            - "all"
            - "--nats-url"
            - "nats://nats.wamn-system.svc.cluster.local:4222"
            - "--nats-tls-ca"
            - "/runtime-cert/ca.crt"
            - "--nats-tls-cert"
            - "/runtime-cert/tls.crt"
            - "--nats-tls-key"
            - "/runtime-cert/tls.key"
          env:
            # Runner/claimer pool: the non-superuser, non-BYPASSRLS app role.
            - name: WAMN_PG_URL
              value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
            # Admin: superuser, used ONLY to provision/drop the ephemeral schema.
            - name: PGUSER
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: username } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: password } }
            - name: PGHOST
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: host } }
            - name: PGPORT
              valueFrom: { secretKeyRef: { name: postgres-fixture-superuser, key: port } }
            - name: WAMN_PG_ADMIN_URL
              value: postgres://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/wamn
          resources:
            # No CPU limit on purpose: a CFS quota would throttle the runtime and
            # inflate the dispatch/throughput tail with scheduler stalls rather
            # than real work — the S2 CFS lesson. Memory is capped.
            requests: { cpu: "2", memory: "512Mi" }
            limits: { memory: "1Gi" }
