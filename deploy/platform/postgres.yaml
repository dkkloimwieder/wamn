# In-cluster PoC Postgres for the S2 wamn:postgres spike (the p99 acceptance
# gate is measured in-cluster). Single pod, ephemeral storage — a benchmark
# fixture, not a durable database.
#
# The init SQL lives in deploy/sql/postgres-init.sql (single source of truth, also
# used by the local docker container). Create its ConfigMap before applying:
#
#   kubectl -n wamn-system create configmap pg-init \
#     --from-file=init.sql=deploy/sql/postgres-init.sql
#   kubectl -n wamn-system apply -f deploy/platform/postgres.yaml
#
# wamn platform pods reach it at postgres.wamn-system.svc.cluster.local:5432; set
# WAMN_PG_URL to postgres://wamn_app:wamn_app@postgres.wamn-system:5432/wamn
# (the plugin connects as the non-superuser, non-BYPASSRLS app role).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: wamn-system
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:18
          env:
            - name: POSTGRES_PASSWORD
              value: postgres
            # initdb runs the mounted script on first start.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "-c"
            - "max_connections=200"
            - "-c"
            - "shared_buffers=256MB"
            # DURABLE commits (wamn-dzhw): the latency gates of record measured
            # against this fixture (pgbench S2 qps/p99, queuebench D15 dispatch
            # SLOs) were systematically optimistic under fsync=off — a "durable
            # write-ahead" p99 without the WAL flush that makes it durable.
            # fsync=on + synchronous_commit=on matches every fsync-on deployment
            # (the CNPG pools always ran on). The pod stays EPHEMERAL: any
            # restart (including the one applying THIS change) wipes provisioned
            # schemas — restore per the wamn-1wdq runbook (reconcile-run-plane +
            # catalog-schema.sql + fixture reseeds) before re-running gates.
            - "-c"
            - "fsync=on"
            - "-c"
            - "synchronous_commit=on"
            # cutbench (l5i9.18) runs a REAL logical slot + pg_walstream session
            # against its throwaway database on this fixture — matching the
            # CNPG default the production pools carry (l5i9.32).
            - "-c"
            - "wal_level=logical"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "wamn"]
            initialDelaySeconds: 5
            periodSeconds: 3
          resources:
            # No CPU limit: CFS throttling of the backends would show up as a
            # query-latency tail. Memory is capped.
            requests: { cpu: "1", memory: "512Mi" }
            limits: { memory: "1Gi" }
      volumes:
        - name: init
          configMap:
            name: pg-init
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: wamn-system
  labels: { app: postgres }
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
# The fixture's superuser credential as a Secret, so admin Jobs (f1-provision,
# the replica-identity-reconcile CronJob) reference it via secretKeyRef instead
# of inline plaintext — one rotation point. Mirrors POSTGRES_PASSWORD above;
# key shape matches the CNPG-generated `<cluster>-superuser` Secrets so job env
# wiring is portable between the fixture and a CNPG target.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-fixture-superuser
  namespace: wamn-system
  labels: { app: postgres }
type: Opaque
stringData:
  username: postgres
  password: postgres
  host: postgres.wamn-system.svc.cluster.local
  port: "5432"
