# [5.9] EXAMPLE per-project credential-vault Secret for the run-worker
# (deploy/platform/runner.yaml mounts it OPTIONAL at /etc/wamn/credentials). The file
# shape is the WAMN_PG_PROJECTS_FILE pattern: a JSON object keyed by project,
# each project an object of { credential-name: secret }. Flows reference a
# credential BY NAME (wamn-flow CredentialRef + node.credential); the vault
# plugin resolves it here at dispatch, scoped to the runner's --project.
#
# DELIBERATELY a separate manifest (the dispatcher-projects/runner-db
# precedent): re-applying runner.yaml must never clobber real per-project
# credentials back to demo values. Real entries land with provisioning.
#
# The demo mapping below is what deploy/gates/credproof-job.yaml asserts is
# delivered (crates/wamn-gates/src/credproof.rs pins the same value); the
# notify-webhook entry is F3's (deploy/gates/f3proof-job.yaml + f3proof.rs).
#
# [wamn-fqg.22] runner->node authn. The reserved credential
# `wamn:node-invoke-signing-key` is the per-project-env HMAC key: the flowrunner
# guest reads it (via wamn:node/credentials.get) to SIGN each custom-node
# invocation, and the serve-node reads it from THIS SAME Secret (deploy/platform/
# serve-node.yaml mounts it too) to VERIFY before installing the grant. It NEVER
# enters an invocation envelope's grant and the serve-node strips it defensively.
# The colon prefix keeps it from colliding with a user-authored credential name.
# Rotate per project-env; a project with no entry runs unauthed (legacy
# network-trust, warned loudly at serve-node startup). Generate real keys with
# e.g. `openssl rand -hex 32`.
#
# [wamn-fqg.30] ROTATION WINDOW. To rotate with zero downtime, add a SECOND
# reserved entry `wamn:node-invoke-signing-key-previous` holding the OLD key and
# move the new key into `wamn:node-invoke-signing-key`. The serve-node accepts a
# signature under EITHER key; the flowrunner always signs with the current one.
# Once every runner has the new current key, drop the `-previous` entry. A second
# NAME (not a delimited two-key value) keeps the {project:{name:secret}} shape.
#
#   kubectl -n wamn-system apply -f deploy/platform/runner-credentials.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: wamn-runner-credentials
  namespace: wamn-system
type: Opaque
stringData:
  credentials.json: |
    {
      "default": {
        "notify-token": "wamn-cred-proof-7f3a9b2e41d05c68",
        "notify-webhook": "wamn-f3-proof-1c4e77a90b2d5f83",
        "wamn:node-invoke-signing-key": "demo-node-invoke-key-REPLACE-with-openssl-rand-hex-32"
      }
    }
