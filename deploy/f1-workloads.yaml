# POC-F1 serving workloads: the webhook-entry sync ingress + an F1 instance of
# the 4.1 api-gateway, both over the poc_f1 project schema (provisioned by
# deploy/f1-provision-job.yaml). Same shape as api-gateway-workload.yaml:
# wasi:http is a built-in (the DynamicRouter routes on the Host header given in
# hostInterfaces config); wamn:postgres is a host PLUGIN and MUST be declared in
# hostInterfaces (the allowlist) or the component fails to instantiate. The
# tenant/project/schema claims are host-injected via localResources.config —
# non-spoofable, the guest never chooses them.
apiVersion: v1
kind: Service
metadata:
  name: webhook-entry
  namespace: wamn-system
  labels:
    app: webhook-entry
spec:
  type: ClusterIP
  selector:
    app: webhook-entry
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: webhook-entry
  namespace: wamn-system
spec:
  replicas: 1
  template:
    spec:
      hostSelector:
        hostgroup: default
      kubernetes:
        service:
          name: webhook-entry
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces: [incoming-handler]
          config:
            host: f1.localhost.direct
        - namespace: wamn
          package: postgres
          version: "0.1.0"
          interfaces: [types, client]
      components:
        - name: webhook-entry
          image: registry.wamn-system.svc.cluster.local:5000/wamn/webhook-entry:dev
          imagePullPolicy: Always
          localResources:
            config:
              wamn.tenant: f1-tenant
              wamn.project: default
              wamn.schema: poc_f1
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-f1
  namespace: wamn-system
  labels:
    app: api-gateway-f1
spec:
  type: ClusterIP
  selector:
    app: api-gateway-f1
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: api-gateway-f1
  namespace: wamn-system
spec:
  replicas: 1
  template:
    spec:
      hostSelector:
        hostgroup: default
      kubernetes:
        service:
          name: api-gateway-f1
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces: [incoming-handler]
          config:
            host: api-f1.localhost.direct
        - namespace: wamn
          package: postgres
          version: "0.1.0"
          interfaces: [types, client]
      components:
        - name: api-gateway-f1
          image: registry.wamn-system.svc.cluster.local:5000/wamn/api-gateway:dev
          imagePullPolicy: Always
          localResources:
            config:
              wamn.tenant: f1-tenant
              wamn.project: default
              wamn.schema: poc_f1
