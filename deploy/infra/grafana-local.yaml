# [9.9] Local Grafana datasources provisioning (docker iteration). Mounted at
# /etc/grafana/provisioning/datasources/datasources.yaml; the same fixed uids as
# deploy/infra/grafana.yaml's ConfigMap, but URLs point at the LOCAL docker
# containers on the wamn-s5 network (Tempo/Loki are optional locally — dashproof
# soft-skips their health in --local mode). The dashboard provider + SRE JSON are
# shared with k8s (deploy/infra/grafana/provisioning + /dashboards) and mounted
# directly. See docs/dashboards.md / docs/build-and-test.md §[9.9].
#   docker run -d --name laneb4e-grafana --network wamn-s5 -p 127.0.0.1:13001:3000 \
#     -e GF_SECURITY_ADMIN_USER=admin -e GF_SECURITY_ADMIN_PASSWORD=admin \
#     -v "$PWD/deploy/infra/grafana-local.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro" \
#     -v "$PWD/deploy/infra/grafana/provisioning/dashboards/providers.yaml:/etc/grafana/provisioning/dashboards/providers.yaml:ro" \
#     -v "$PWD/deploy/infra/grafana/dashboards:/var/lib/grafana/dashboards:ro" \
#     grafana/grafana:11.4.0
apiVersion: 1
datasources:
  - name: Prometheus
    uid: wamn-prometheus
    type: prometheus
    access: proxy
    url: http://laneb4e-prometheus:9090
    isDefault: true
  - name: Tempo
    uid: wamn-tempo
    type: tempo
    access: proxy
    url: http://laneb4e-tempo:3200
  - name: Loki
    uid: wamn-loki
    type: loki
    access: proxy
    url: http://laneb4e-loki:3100
