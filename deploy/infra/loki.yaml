# S5 logging sink: single-binary Loki 3.x with native OTLP ingest
# (/otlp/v1/logs). The OTel Collector (deploy/infra/otel-collector.yaml) forwards the
# host's OTLP-gRPC logs here over otlphttp. Loki promotes `service.name` to the
# `service_name` stream label and keeps the enrichment fields
# (tenant/project/flow/run/node/run_label/seq) as structured metadata, which the
# logbench LogQL filters on (`{service_name="wamn-host"} | run_label="…"`).
#
# Limits are set generously so a 10k lines/s burst is not rate-limited at the
# ingester — the ONLY intentional drop point in S5 is the plugin's bounded front
# queue (counted), so nothing downstream should silently drop.
#
# wamn-yf3 (9.3): storage is now the in-cluster MinIO (bucket `wamn-loki`, created
# by minio-init in deploy/infra/minio.yaml) with a compactor enforcing a 168h
# retention_period — so history survives a pod restart and old chunks are reaped.
# Still SINGLE-BINARY + SINGLE-TENANT (tenant stays a structured-metadata attr);
# HA / multitenancy / per-plan retention tiers are 9.5, out of scope. Apply the
# object store FIRST so the bucket + Secret exist:
#
#   kubectl -n wamn-system apply -f deploy/infra/minio.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/minio-init --timeout=120s
#   kubectl -n wamn-system apply -f deploy/infra/loki.yaml
#   kubectl -n wamn-system rollout status deploy/loki --timeout=120s
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: wamn-system
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      # wamn-yf3: DURABLE object storage on the in-cluster MinIO
      # (deploy/infra/minio.yaml), bucket `wamn-loki` (created by minio-init).
      # Chunks + the tsdb index ship here; only the WAL + active index live on
      # the pod's emptyDir, so a pod restart keeps history. Credentials come from
      # the shared `wamn-object-store` Secret via `-config.expand-env` + envFrom
      # (see the Deployment) — never baked into this ConfigMap.
      storage:
        s3:
          endpoint: minio.wamn-system.svc:9000
          insecure: true
          bucketnames: wamn-loki
          access_key_id: ${ACCESS_KEY_ID}
          secret_access_key: ${ACCESS_SECRET_KEY}
          s3forcepathstyle: true
          region: us-east-1
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
    # wamn-yf3: single-binary compactor with retention. Single-tenant, so
    # retention is one flat window (per-plan tiers are 9.5, out of scope).
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: s3
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      reject_old_samples: false
      # wamn-yf3: 7-day retention (the compactor enforces it against S3).
      retention_period: 168h
      ingestion_rate_mb: 256
      ingestion_burst_size_mb: 512
      per_stream_rate_limit: 256MB
      per_stream_rate_limit_burst: 512MB
      max_streams_per_user: 0
      max_entries_limit_per_query: 5000000
      max_query_series: 100000
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: wamn-system
spec:
  replicas: 1
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          # -config.expand-env lets the S3 credentials come from the mounted
          # Secret env (${ACCESS_KEY_ID} / ${ACCESS_SECRET_KEY}) rather than the
          # ConfigMap (wamn-yf3).
          args: ["-config.file=/etc/loki/loki.yaml", "-config.expand-env=true"]
          envFrom:
            # The shared object-store credentials (deploy/infra/minio.yaml).
            - secretRef:
                name: wamn-object-store
          ports:
            - { name: http, containerPort: 3100 }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /loki }
          resources:
            # No CPU limit (CFS-quota tail artifact — the S2 lesson); the sink
            # must not be throttled while accounting a 10k lines/s burst.
            requests: { cpu: "1", memory: "512Mi" }
            limits: { memory: "2Gi" }
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: wamn-system
spec:
  selector: { app: loki }
  ports:
    - { name: http, port: 3100, targetPort: 3100 }
