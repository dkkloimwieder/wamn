# 3-node local dev cluster (plan 1.1). NodePort 30950 on the control-plane
# node maps to host port 80. Admission plugins mirror upstream's e2e config.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        enable-admission-plugins: NodeRestriction,OwnerReferencesPermissionEnforcement
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30950
        hostPort: 80
        protocol: TCP
  - role: worker
  - role: worker
