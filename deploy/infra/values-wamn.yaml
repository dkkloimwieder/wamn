# Helm values for the runtime-operator chart with the wamn custom host image
# (S1). Install:
#   helm upgrade --install --create-namespace -n wamn-system wamn \
#     oci://ghcr.io/wasmcloud/charts/runtime-operator --version 2.5.2 \
#     -f deploy/infra/values-wamn.yaml
# (2.5.2 chart == the chart at our pinned runtime rev 8b53285 modulo version
# strings; no 2.5.1 chart was published.)

# Deprecated HTTP gateway off: its NodePort would collide with workload
# Services on 30950; routing is EndpointSlice-based now.
gateway:
  enabled: false

runtime:
  image:
    registry: ""              # bare local name, loaded via `kind load`
    repository: wamn-host
    tag: dev
    pull_policy: Never
  hostGroups:
    - name: default
      replicas: 3
      service:
        type: ClusterIP
      http:
        enabled: true
        port: 80
      # [4.1b] The default project's Postgres URL: the wamn:postgres plugin's
      # from_env() default pool connects as this non-superuser role, so a
      # per-project api-gateway workload (project=default) can serve its catalog.
      env:
        - name: WAMN_PG_URL
          value: postgres://wamn_app:wamn_app@postgres.wamn-system.svc.cluster.local:5432/wamn
        # [l5i9.17] The data-plane (event-plane) NATS for the wamn:jetstream
        # plugin — the materializer Service workload's stream/doorbell path.
        # Absent, the plugin still links and returns connection-unavailable.
        - name: WAMN_EVT_NATS_URL
          value: nats://evt-nats.wamn-system.svc.cluster.local:4222
      # [4.1b] Allow plain-HTTP OCI pulls so the host can pull locally-built
      # component images from the in-cluster registry (deploy/platform/registry.yaml).
      extraArgs:
        - "--allow-insecure-registries"
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          # Roomy on purpose: the S1 density/cap-kill measurements must hit
          # wasmtime's 256 MiB per-component cap, not the K8s OOM killer.
          memory: "4Gi"
          cpu: "2"
