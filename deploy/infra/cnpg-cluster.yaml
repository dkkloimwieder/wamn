# The T3 TRIALS POOL (D6 four-tier topology, docs/postgres-topology.md §T3): ONE
# shared CloudNativePG Cluster holding a database per project-env, the
# PRE-CONTRACT tier — trials, demos, hobby evaluation. Pooled density where it
# belongs: many small idle tenants who haven't paid for a dedicated instance.
# The RLS floor (per-DB CONNECT + FORCE RLS within) is LOAD-BEARING here (it is
# belt-and-braces on the isolated T2/T4 clusters). Registered as the `trials`
# tier via `wamn-ctl provision-org --tier trials --pool wamn-pg` (wamn-q3n.9);
# `provision-project-env` then creates a trials org's databases on this pool.
# CONVERSION = promotion to a dedicated T2 pair (the tier-move, wamn-q3n.13).
#
# Stands up ALONGSIDE the guardrailed deploy/platform/postgres.yaml pod — the legacy S2–S6
# gates keep running against that; the 2.3 provisionbench + the wamn-q3n
# provisioning gates target this cluster. Pinned operator: deploy/infra/cnpg-operator.yaml
# (CNPG 1.29.2). SHARED-CLUSTER GUARDRAIL: this file is doc-of-intent — the live
# `wamn-pg` Cluster is never re-applied/recreated (provisioning adds Databases to
# it additively). Retiring the legacy postgres.yaml gate pod is a separate concern
# (wamn-689).
#
# Cross-tenant isolation = per-project-env database + per-DB CONNECT (PUBLIC
# revoked) + RLS within, under the single shared NOSUPERUSER `wamn_app` role
# (roles are cluster-global). See docs/provisioning.md.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: wamn-pg
  namespace: wamn-system
  # T3 identity (the org-cluster label convention; the pool hosts many orgs, so
  # `wamn.org`/`wamn.side` do not apply — `wamn.tier` names its role instead).
  labels:
    app.kubernetes.io/managed-by: wamn
    app.kubernetes.io/component: trials-pool
    wamn.tier: trials
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  # provision-project connects as the `postgres` superuser to CREATE DATABASE /
  # CREATE ROLE (the runtime `wamn_app` role is NOSUPERUSER/NOCREATEDB). CNPG
  # disables the superuser password by default; enable it so the secret
  # `wamn-pg-superuser` carries a usable admin URI.
  enableSuperuserAccess: true
  primaryUpdateStrategy: unsupervised
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    # NO cpu limit — the DB-serving path must not be CFS-throttled (S2 lesson).
  storage:
    size: 2Gi
  postgresql:
    # Allow non-TLS password connections from the pod network (the whole repo
    # connects NoTls). Prepended to CNPG's default hostssl rules.
    pg_hba:
      - host all all all scram-sha-256
    parameters:
      # CDC-capture WAL bound (§11 sharp edge, docs/event-plane-jetstream.md;
      # wamn-l5i9.32). The reader MVP (l5i9.10) runs CDC on this shared pool, and
      # the reader never GCs a slot it did not create — without a bound a
      # forgotten/invalidated logical slot pins WAL until the volume fills.
      # SINGLE-instance pool: only the WAL bound is needed (no standby to sync a
      # slot to, so none of the failover-slot-sync GUCs apply). Matches what
      # crates/wamn-provision render_org_cluster_set emits for a 1-instance
      # cluster; wal_level=logical is already the CNPG default.
      max_slot_wal_keep_size: "1GB"
  bootstrap:
    initdb:
      database: app
      owner: app
