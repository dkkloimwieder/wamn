# Exec-ladder rung 1 (wamn-ojm.1) — the DEPLOYED-runner conformance gate of
# record. Seeds ONE manual run into the demo schema and waits for the deployed
# `run-worker` service (deploy/runner.yaml) to claim + drive it, then asserts the
# run completed correctly (result echoed, two node_runs). A pure client — it
# proves the deployed runner executes a flow correctly, OUTSIDE a bench harness.
#
# Prerequisites (the demo schema + flow must exist and the runner must be live):
#   # 1. provision the demo schema (run-state + run-queue + flows), additive:
#   #    sed 's/\bwamn_run\b/wamn_runner_demo/g' over deploy/{run-state,run-queue,flows}.sql
#   #    | kubectl -n wamn-system exec -i <postgres-pod> -- psql -U postgres -d wamn
#   # 2. register deploy/ladder/rung1.flow.json active as tenant demo-tenant
#   # 3. kubectl -n wamn-system apply -f deploy/runner-db.example.yaml -f deploy/runner.yaml
#   kubectl -n wamn-system apply -f deploy/ladderproof-job.yaml
#   kubectl -n wamn-system wait --for=condition=complete job/ladderproof --timeout=120s
#   kubectl -n wamn-system logs job/ladderproof
apiVersion: batch/v1
kind: Job
metadata:
  name: ladderproof
  namespace: wamn-system
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ladderproof
    spec:
      restartPolicy: Never
      containers:
        - name: ladderproof
          image: wamn-gates:dev
          imagePullPolicy: IfNotPresent
          args:
            [
              "--log-level", "error",
              "ladderproof",
              "--schema", "wamn_runner_demo",
              "--tenant", "demo-tenant",
              "--timeout-secs", "60",
            ]
          env:
            # The project's app (wamn_app) URL — the same Secret the runner uses,
            # so the seed lands under the same tenant/RLS floor the runner claims
            # under.
            - name: WAMN_PG_URL
              valueFrom:
                secretKeyRef:
                  name: wamn-runner-db
                  key: url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
