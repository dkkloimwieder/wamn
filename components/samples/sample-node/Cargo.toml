[package]
name = "sample-node"
version.workspace = true
edition.workspace = true

# The reference CUSTOM node (5.4): a zero-import `world node` component built
# on the wamn-node-guest scaffolding — the SDK trait impl below is the ENTIRE
# source; componentization is one macro. It doubles as the frozen-contract
# conformance fixture: the `nodebench --mode sample` gate drives it through
# every taxonomy variant, port selection, and the streamed-payload refusal.
# The POC-F2 custom node (wamn-1ab) starts from this shape.

[dependencies]
serde_json = "1"
wamn-node-sdk = { path = "../../../crates/wamn-node-sdk" }
wamn-node-guest = { path = "../../../crates/wamn-node-guest" }

[lib]
crate-type = ["cdylib"]
