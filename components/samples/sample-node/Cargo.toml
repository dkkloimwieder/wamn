[package]
name = "sample-node"
version.workspace = true
edition.workspace = true

# The reference CUSTOM node (5.4): a zero-import `world node` component built
# on the wamn-node-guest scaffolding — the SDK trait impl below is the ENTIRE
# source; componentization is one macro. It doubles as the frozen-contract
# conformance fixture: the `nodebench --mode sample` gate drives it through
# every taxonomy variant, port selection, and the streamed-payload refusal.
# The POC-F2 custom node (wamn-1ab) starts from this shape.

[dependencies]
serde_json = "1"
wamn-node-sdk = { path = "../../../crates/wamn-node-sdk" }
wamn-node-guest = { path = "../../../crates/wamn-node-guest" }

[lib]
crate-type = ["cdylib"]

# The 5.5 builder reads this table to build the wamn.node.manifest OCI annotation
# (design-note 8); it matches the committed sample-echo.manifest.json identity.
# Ignored by `cargo build` (metadata only) — the wasm is unaffected.
[package.metadata.wamn-node]
node-type = "sample-echo"
name = "Sample Echo"
description = "Reference zero-import custom node (5.4): echoes its input on a config-selected port; the frozen wamn:node 0.1 conformance fixture."
ordering = ["unordered"]
